<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- White Canvas Background -->
  <rect width="100" height="100" rx="20" fill="#FFFFFF"/>
  
  <defs>
    <!-- Gradient 1: Odoo Purple/Pink -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6E2582" />
      <stop offset="100%" stop-color="#B72A87" />
    </linearGradient>
    <!-- Gradient 2: Odoo Cyan/Teal -->
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A09D" />
      <stop offset="100%" stop-color="#21B853" />
    </linearGradient>
  </defs>

  <g style="mix-blend-mode: multiply; opacity: 0.9;">
    <!-- Left Hand / Custody giver bracket -->
    <path d="M 25 35 C 25 25, 45 25, 45 45 L 45 65 C 45 75, 25 75, 25 55 Z" fill="url(#grad1)" />
    
    <!-- Right Hand / Custody receiver bracket intersecting -->
    <path d="M 75 65 C 75 75, 55 75, 55 55 L 55 35 C 55 25, 75 25, 75 45 Z" fill="url(#grad2)" />
    
    <!-- Central Secure Custody Node -->
    <circle cx="50" cy="50" r="12" fill="#FF9F43" />
  </g>
</svg>
